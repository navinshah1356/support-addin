<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Support Service</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css">

  <style>
    .hidden { display: none; }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>💼 Support Service</h2>
    <button id="toggleTheme" class="theme-toggle">🌙</button>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="card">
    <div class="button-group">
      <button id="btnCreate" class="btn primary">⚡ Create Incident</button>
      <button id="btnFollowUp" class="btn secondary">📝 Log Details</button>
      <button id="btnClose" class="btn danger">✅ Close Incident</button>
    </div>
  </div>

  <!-- AI SUMMARY -->
  <div id="aiSection" class="card">
    <h3>🤖 AI Summary</h3>
    <div id="loader" class="loader hidden"></div>
    <textarea id="summaryBox" placeholder="AI-generated summary will appear here..."></textarea>
  </div>

  <!-- INCIDENT PREVIEW -->
  <div id="previewSection" class="card">
    <h3>📋 Incident Preview</h3>

    <div class="preview-grid">
      <div class="field">
        <label>Incident Number</label>
        <span id="incNumber">-</span>
      </div>

      <div class="field">
        <label>Reported Time</label>
        <span id="incTime">-</span>
      </div>

      <div class="field">
        <label>Opened By</label>
        <span id="incUser">-</span>
      </div>

      <div class="field full">
        <label>Subject</label>
        <span id="incSubject">-</span>
      </div>
    </div>

    <label>Description</label>
    <textarea id="incDescription"></textarea>

    <button id="btnFinalCreate" class="btn primary">
      🚀 Confirm & Create Incident
    </button>
  </div>

  <!-- CLOSE INCIDENT -->
  <div id="closeSection" class="card hidden">
    <h3>🔒 Close Incident</h3>

    <input id="closeIncidentId" placeholder="Enter Incident Number" />

    <button id="btnFetchIncident" class="btn secondary">
      🔍 Fetch Incident
    </button>

    <textarea id="rootCause" placeholder="Enter Root Cause"></textarea>
    <textarea id="resolution" placeholder="Enter Resolution"></textarea>

    <button id="btnCloseFinal" class="btn danger">
      ✅ Close Incident
    </button>
  </div>

</div>

<div id="toast" class="toast"></div>

<script src="taskpane.js"></script>

</body>
</html>
