<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Support Service</title>

  <!-- Office.js (REQUIRED) -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <!-- Your CSS (if you have one) -->
  <link rel="stylesheet" href="taskpane.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>💼 Support Service</h2>
    <button id="toggleTheme" class="theme-toggle">🌙</button>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="card">
    <div class="button-group">
      <button id="btnCreate" class="btn primary">⚡ Create Incident</button>
      <button id="btnFollowUp" class="btn secondary">📩 Follow-up Email</button>
      <button id="btnClose" class="btn danger">✅ Close Incident</button>
    </div>
  </div>

  <!-- AI SUMMARY -->
  <div class="card">
    <h3>🤖 AI Summary</h3>
    <div id="loader" class="loader hidden"></div>
    <textarea id="summaryBox" placeholder="AI-generated summary will appear here..."></textarea>
  </div>

  <!-- INCIDENT PREVIEW -->
  <div class="card">
    <h3>📋 Incident Preview</h3>

    <div class="preview-grid">
      <div class="field">
        <label>Incident Number</label>
        <span id="incNumber">-</span>
      </div>

      <div class="field">
        <label>Reported Time</label>
        <span id="incTime">-</span>
      </div>

      <div class="field">
        <label>Opened By</label>
        <span id="incUser">-</span>
      </div>

      <div class="field full">
        <label>Subject</label>
        <span id="incSubject">-</span>
      </div>
    </div>

    <label class="desc-label">Description</label>
    <textarea id="incDescription" placeholder="Incident description..."></textarea>

    <button id="btnFinalCreate" class="btn primary" style="margin-top:12px;">
      🚀 Confirm & Create Incident
    </button>
  </div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- ✅ IMPORTANT: Your JS -->
<script src="taskpane.js"></script>

</body>
</html>
